<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin — Adega do Motta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #cc0000;
    --red-hot: #ff2200;
    --yellow: #ffcc00;
    --black: #0a0a0a;
    --dark: #111111;
    --card: #1a1a1a;
    --card2: #222;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #888;
    --green: #25d366;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  /* LOGIN */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(ellipse at center, rgba(204,0,0,0.15) 0%, transparent 70%);
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 36px; background: linear-gradient(135deg, var(--red-hot), var(--yellow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
  .login-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 2px; text-transform: uppercase; }
  .login-label { display: block; text-align: left; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .login-input { width: 100%; background: var(--dark); border: 1px solid var(--border); color: var(--text); padding: 12px 14px; border-radius: 6px; font-size: 15px; font-family: 'Barlow', sans-serif; margin-bottom: 16px; transition: border-color 0.2s; }
  .login-input:focus { outline: none; border-color: var(--red); }
  .login-btn { width: 100%; background: var(--red); color: white; border: none; padding: 14px; border-radius: 6px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
  .login-btn:hover { background: var(--red-hot); }
  .login-error { color: #ff4444; font-size: 13px; margin-top: 10px; display: none; }

  /* ADMIN PANEL */
  .admin-screen { display: none; min-height: 100vh; }
  .admin-header { background: var(--dark); border-bottom: 1px solid var(--border); padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .admin-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; background: linear-gradient(135deg, var(--red-hot), var(--yellow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .admin-user { display: flex; align-items: center; gap: 10px; }
  .user-badge { background: var(--card2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .user-badge.dono { border-color: var(--yellow); color: var(--yellow); }
  .user-badge.func { border-color: #4488ff; color: #4488ff; }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  .admin-body { padding: 24px 20px; max-width: 900px; margin: 0 auto; }

  /* STATUS BAR */
  .status-bar { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; margin-bottom: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .status-dot.ok { background: #25d366; }
  .status-dot.err { background: var(--red); }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab { background: none; border: none; color: var(--muted); padding: 10px 18px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; margin-bottom: -1px; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--red); border-bottom-color: var(--red); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--yellow); letter-spacing: 1px; }
  .stat-label { color: var(--muted); font-size: 12px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; margin-bottom: 16px; }

  .add-product-btn { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; margin-bottom: 20px; transition: background 0.2s; display: flex; align-items: center; gap: 6px; }
  .add-product-btn:hover { background: var(--red-hot); }

  .product-list { display: flex; flex-direction: column; gap: 10px; }
  .product-row { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: border-color 0.2s; }
  .product-row:hover { border-color: #333; }

  .product-thumb {
    width: 52px;
    height: 52px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--card2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    overflow: hidden;
  }
  .product-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .product-details { flex: 1; min-width: 0; }
  .product-row-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; }
  .product-row-meta { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .product-row-price { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--yellow); flex-shrink: 0; }
  .product-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .edit-btn { background: var(--card2); border: 1px solid var(--border); color: var(--text); width: 34px; height: 34px; border-radius: 4px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .edit-btn:hover { border-color: var(--yellow); }
  .del-btn { background: var(--card2); border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px; border-radius: 4px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .del-btn:hover { border-color: var(--red); color: var(--red); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--dark); border: 1px solid var(--border); border-radius: 12px; padding: 28px 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .form-input, .form-select { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 11px 14px; border-radius: 6px; font-size: 15px; font-family: 'Barlow', sans-serif; transition: border-color 0.2s; }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--red); }
  .form-select option { background: var(--dark); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .modal-save { flex: 1; background: var(--red); color: white; border: none; padding: 13px; border-radius: 6px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .modal-save:hover { background: var(--red-hot); }
  .modal-save:disabled { opacity: 0.6; cursor: not-allowed; }
  .modal-cancel { background: var(--card); color: var(--muted); border: 1px solid var(--border); padding: 13px 20px; border-radius: 6px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .modal-cancel:hover { color: var(--text); }

  /* IMAGE UPLOAD */
  .img-upload-area {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
  }
  .img-upload-area:hover { border-color: var(--red); }
  .img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .img-upload-icon { font-size: 32px; margin-bottom: 8px; }
  .img-upload-text { color: var(--muted); font-size: 13px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; }
  .img-preview-wrap { margin-top: 10px; display: none; }
  .img-preview-wrap img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
  .img-remove-btn { background: none; border: none; color: var(--red); font-size: 12px; cursor: pointer; margin-top: 6px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; text-transform: uppercase; }

  /* PROGRESS */
  .upload-progress { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; display: none; }
  .upload-progress-bar { height: 100%; background: var(--red); border-radius: 2px; width: 0; transition: width 0.3s; }

  /* USERS TAB */
  .user-list { display: flex; flex-direction: column; gap: 10px; }
  .user-row { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .user-icon { font-size: 28px; }
  .user-info { flex: 1; }
  .user-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; }
  .user-role { font-size: 13px; margin-top: 2px; }
  .user-role.dono { color: var(--yellow); }
  .user-role.func { color: #4488ff; }

  .empty { text-align: center; color: var(--muted); padding: 40px; font-size: 14px; }
  .loading { text-align: center; color: var(--muted); padding: 40px; font-size: 14px; }

  @media (max-width: 500px) {
    .admin-body { padding: 16px; }
    .form-row { grid-template-columns: 1fr; }
    .product-row-price { display: none; }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">Adega do Motta</div>
    <div class="login-sub">Painel Administrativo</div>
    <label class="login-label">Usuário</label>
    <input class="login-input" type="text" id="login-user" placeholder="Digite seu usuário">
    <label class="login-label">Senha</label>
    <input class="login-input" type="password" id="login-pass" placeholder="Digite sua senha" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">🔐 Entrar</button>
    <div class="login-error" id="login-error">Usuário ou senha incorretos</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-screen" id="admin-screen">
  <div class="admin-header">
    <div class="admin-logo">⚙️ Admin — Adega do Motta</div>
    <div class="admin-user">
      <span class="user-badge" id="role-badge">Dono</span>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- STATUS -->
    <div class="status-bar" id="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Conectando ao banco de dados...</span>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab(event,'produtos')">🍺 Produtos</button>
      <button class="tab" onclick="switchTab(event,'usuarios')" id="tab-btn-usuarios">👥 Usuários</button>
    </div>

    <!-- TAB: PRODUTOS -->
    <div class="tab-content active" id="tab-produtos">
      <div class="stats" id="stats"></div>
      <h2 class="section-title">Gerenciar Produtos</h2>
      <button class="add-product-btn" id="btn-add-product" onclick="openModal()">＋ Adicionar produto</button>
      <div class="product-list" id="product-list"><div class="loading">Carregando produtos...</div></div>
    </div>

    <!-- TAB: USUÁRIOS -->
    <div class="tab-content" id="tab-usuarios">
      <h2 class="section-title">Usuários</h2>
      <div class="user-list" id="user-list"></div>
    </div>

  </div>
</div>

<!-- MODAL PRODUTO -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Novo Produto</div>
    <div class="form-group">
      <label class="form-label">Nome do produto</label>
      <input class="form-input" id="f-name" placeholder="Ex: Heineken Long Neck">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Tamanho / Volume</label>
        <input class="form-input" id="f-vol" placeholder="Ex: 330ml">
      </div>
      <div class="form-group">
        <label class="form-label">Preço (R$)</label>
        <input class="form-input" id="f-price" type="number" step="0.01" placeholder="0,00">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select class="form-select" id="f-cat">
          <option value="cerveja">🍺 Cerveja</option>
          <option value="destilado">🥃 Destilado</option>
          <option value="vinho">🍷 Vinho</option>
          <option value="energetico">⚡ Energético</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Emoji (se não tiver foto)</label>
        <input class="form-input" id="f-emoji" placeholder="🍺" maxlength="4">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Foto do produto</label>
      <div class="img-upload-area" id="upload-area" onclick="document.getElementById('f-img-file').click()">
        <input type="file" id="f-img-file" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
        <div class="img-upload-icon">📷</div>
        <div class="img-upload-text">Clique para escolher uma foto<br><span style="font-size:11px;color:#555">JPG, PNG, WEBP — máx 5MB</span></div>
      </div>
      <div class="upload-progress" id="upload-progress">
        <div class="upload-progress-bar" id="upload-progress-bar"></div>
      </div>
      <div class="img-preview-wrap" id="img-preview-wrap">
        <img id="img-preview-tag" src="">
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
          <span style="color:#25d366;font-size:12px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px" id="img-status"></span>
          <button class="img-remove-btn" onclick="removeImage()">✕ Remover foto</button>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Disponível?</label>
      <select class="form-select" id="f-available">
        <option value="1">✅ Sim, disponível</option>
        <option value="0">❌ Fora de estoque</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-save" id="modal-save-btn" onclick="saveProduct()">💾 Salvar</button>
    </div>
  </div>
</div>

<script>
// =====================
// SUPABASE CONFIG
// =====================
const SUPABASE_URL = 'https://wxtuartqvtysntvrwwjl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_y_dagzewnlnI6uTCyEJZxA_tcpzd6Vs';
const BUCKET = 'produto-imagens';

async function sbFetch(path, options = {}) {
  const url = `${SUPABASE_URL}${path}`;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    ...options.headers
  };
  return fetch(url, { ...options, headers });
}

// =====================
// USUÁRIOS
// =====================
const USERS = [
  { user: 'dono', passHash: '64f7eba2d0e2f5e0ce4199030482aad33df9aa18f830832f777bdf0c0a467736', role: 'dono', name: 'Jean Claude (Dono)' },
  { user: 'func', passHash: '75b96e662678d418ef9a4d9d009f352d1ea7ea82011b9277eb96e4793300138d', role: 'funcionario', name: 'Funcionário' },
];

// =====================
// STATE
// =====================
let currentUser = null;
let products = [];
let editingId = null;
let selectedImageFile = null;
let currentImgUrl = null;

// =====================
// LOGIN
// =====================
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  const encoder = new TextEncoder();
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(p));
  const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
  const found = USERS.find(x => x.user === u && x.passHash === hashHex);
  if (!found) { document.getElementById('login-error').style.display = 'block'; return; }
  currentUser = found;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  const badge = document.getElementById('role-badge');
  badge.textContent = found.role === 'dono' ? '👑 Dono' : '👤 Funcionário';
  badge.className = 'user-badge ' + (found.role === 'dono' ? 'dono' : 'func');
  if (found.role !== 'dono') document.getElementById('tab-btn-usuarios').style.display = 'none';
  await initSupabase();
  renderUsers();
}

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

// =====================
// SUPABASE INIT
// =====================
async function initSupabase() {
  setStatus('connecting');
  try {
    // Garante que o bucket existe
    await ensureBucket();
    await loadProducts();
    setStatus('ok');
  } catch(e) {
    setStatus('err', 'Erro ao conectar: ' + e.message);
  }
}

async function ensureBucket() {
  // Tenta criar o bucket (ignora erro se já existir)
  await sbFetch('/storage/v1/bucket', {
    method: 'POST',
    body: JSON.stringify({ id: BUCKET, name: BUCKET, public: true })
  });
}

function setStatus(state, msg) {
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  if (state === 'ok') { dot.className = 'status-dot ok'; text.textContent = '✅ Conectado ao Supabase — alterações sincronizam em tempo real'; }
  else if (state === 'err') { dot.className = 'status-dot err'; text.textContent = msg || 'Erro de conexão'; }
  else { dot.className = 'status-dot'; text.textContent = 'Conectando ao banco de dados...'; }
}

// =====================
// CARREGAR PRODUTOS
// =====================
async function loadProducts() {
  const res = await sbFetch('/rest/v1/produtos?select=*&order=id.asc');
  if (!res.ok) throw new Error(await res.text());
  products = await res.json();
  renderAll();
}

// =====================
// TABS
// =====================
function switchTab(e, name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// =====================
// RENDER
// =====================
function fmt(v) { return 'R$ ' + Number(v).toFixed(2).replace('.', ','); }

function renderAll() { renderStats(); renderProducts(); }

function renderStats() {
  const total = products.length;
  const available = products.filter(p => p.available).length;
  const cats = [...new Set(products.map(p => p.cat))].length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Produtos</div></div>
    <div class="stat-card"><div class="stat-num">${available}</div><div class="stat-label">Disponíveis</div></div>
    <div class="stat-card"><div class="stat-num">${total - available}</div><div class="stat-label">Sem estoque</div></div>
    <div class="stat-card"><div class="stat-num">${cats}</div><div class="stat-label">Categorias</div></div>
  `;
}

function thumbHTML(p) {
  if (p.img_url) return `<div class="product-thumb"><img src="${p.img_url}" alt="${p.name}" onerror="this.parentElement.innerHTML='${p.emoji||'🍺'}'"></div>`;
  return `<div class="product-thumb">${p.emoji || '🍺'}</div>`;
}

function renderProducts() {
  const isDono = currentUser.role === 'dono';
  document.getElementById('btn-add-product').style.display = isDono ? 'flex' : 'none';
  const list = document.getElementById('product-list');
  if (!products.length) { list.innerHTML = '<div class="empty">Nenhum produto cadastrado ainda.</div>'; return; }
  list.innerHTML = products.map(p => `
    <div class="product-row" style="opacity:${p.available ? 1 : 0.5}">
      ${thumbHTML(p)}
      <div class="product-details">
        <div class="product-row-name">${p.name} ${!p.available ? '<span style="color:#ff4444;font-size:12px">• Sem estoque</span>' : ''}</div>
        <div class="product-row-meta">${p.vol || ''} · ${p.cat} ${p.img_url ? '· <span style="color:#25d366">📷 com foto</span>' : ''}</div>
      </div>
      <div class="product-row-price">${fmt(p.price)}</div>
      <div class="product-actions">
        <button class="edit-btn" onclick="openModal(${p.id})" title="Editar">✏️</button>
        ${isDono ? `<button class="del-btn" onclick="deleteProduct(${p.id})" title="Excluir">🗑️</button>` : ''}
      </div>
    </div>
  `).join('');
}

function renderUsers() {
  document.getElementById('user-list').innerHTML = USERS.map(u => `
    <div class="user-row">
      <span class="user-icon">${u.role === 'dono' ? '👑' : '👤'}</span>
      <div class="user-info">
        <div class="user-name">${u.name}</div>
        <div class="user-role ${u.role === 'dono' ? 'dono' : 'func'}">${u.role === 'dono' ? 'Dono — acesso total' : 'Funcionário — editar preços'}</div>
      </div>
    </div>
  `).join('');
}

// =====================
// MODAL
// =====================
function openModal(id) {
  editingId = id || null;
  selectedImageFile = null;
  currentImgUrl = null;
  document.getElementById('modal-title').textContent = id ? 'Editar Produto' : 'Novo Produto';
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('upload-area').style.display = 'block';
  document.getElementById('f-img-file').value = '';

  if (id) {
    const p = products.find(x => x.id === id);
    document.getElementById('f-name').value = p.name;
    document.getElementById('f-vol').value = p.vol || '';
    document.getElementById('f-price').value = p.price;
    document.getElementById('f-cat').value = p.cat;
    document.getElementById('f-emoji').value = p.emoji || '🍺';
    document.getElementById('f-available').value = p.available ? '1' : '0';
    if (p.img_url) {
      currentImgUrl = p.img_url;
      showPreview(p.img_url, '📷 Foto atual');
    }
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-vol').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-cat').value = 'cerveja';
    document.getElementById('f-emoji').value = '🍺';
    document.getElementById('f-available').value = '1';
  }

  const isDono = currentUser.role === 'dono';
  ['f-name','f-vol','f-cat','f-emoji'].forEach(fid => { document.getElementById(fid).disabled = !isDono; });
  document.getElementById('upload-area').style.pointerEvents = isDono ? 'auto' : 'none';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
  selectedImageFile = null;
  currentImgUrl = null;
}

function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('Imagem muito grande! Máximo 5MB.'); return; }
  selectedImageFile = file;
  const reader = new FileReader();
  reader.onload = ev => showPreview(ev.target.result, '✅ Foto selecionada — será enviada ao salvar');
  reader.readAsDataURL(file);
}

function showPreview(src, statusMsg) {
  document.getElementById('img-preview-tag').src = src;
  document.getElementById('img-preview-wrap').style.display = 'block';
  document.getElementById('img-status').textContent = statusMsg || '';
  document.getElementById('upload-area').style.display = 'none';
}

function removeImage() {
  selectedImageFile = null;
  currentImgUrl = null;
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('upload-area').style.display = 'block';
  document.getElementById('f-img-file').value = '';
}

// =====================
// UPLOAD IMAGEM
// =====================
async function uploadImage(file, productName) {
  const ext = file.name.split('.').pop();
  const fname = `${Date.now()}-${productName.replace(/\s+/g,'-').toLowerCase()}.${ext}`;
  const progress = document.getElementById('upload-progress');
  const bar = document.getElementById('upload-progress-bar');
  progress.style.display = 'block';
  bar.style.width = '30%';

  const res = await sbFetch(`/storage/v1/object/${BUCKET}/${fname}`, {
    method: 'POST',
    headers: { 'Content-Type': file.type },
    body: file
  });

  bar.style.width = '100%';
  setTimeout(() => { progress.style.display = 'none'; bar.style.width = '0'; }, 600);

  if (!res.ok) {
    const err = await res.text();
    throw new Error('Erro no upload: ' + err);
  }

  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${fname}`;
}

// =====================
// SALVAR PRODUTO
// =====================
async function saveProduct() {
  const name = document.getElementById('f-name').value.trim();
  const vol = document.getElementById('f-vol').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const cat = document.getElementById('f-cat').value;
  const emoji = document.getElementById('f-emoji').value.trim() || '🍺';
  const available = document.getElementById('f-available').value === '1';

  if (!name || isNaN(price)) { alert('Preencha nome e preço!'); return; }

  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Salvando...';

  try {
    let img_url = currentImgUrl || null;

    if (selectedImageFile) {
      img_url = await uploadImage(selectedImageFile, name);
    }

    const payload = { name, vol, price, cat, emoji, available, img_url };

    let res;
    if (editingId) {
      res = await sbFetch(`/rest/v1/produtos?id=eq.${editingId}`, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify(payload)
      });
    } else {
      res = await sbFetch('/rest/v1/produtos', {
        method: 'POST',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify(payload)
      });
    }

    if (!res.ok) throw new Error(await res.text());

    await loadProducts();
    closeModal();
  } catch(e) {
    alert('Erro ao salvar: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Salvar';
  }
}

// =====================
// DELETAR
// =====================
async function deleteProduct(id) {
  if (!confirm('Tem certeza que quer excluir este produto?')) return;
  const res = await sbFetch(`/rest/v1/produtos?id=eq.${id}`, { method: 'DELETE' });
  if (!res.ok) { alert('Erro ao excluir'); return; }
  await loadProducts();
}
</script>
