<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin — Adega do Motta</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --red:#cc0000;--red-hot:#ff2200;--yellow:#ffcc00;
  --black:#0a0a0a;--dark:#111;--card:#1a1a1a;--card2:#222;
  --border:#2a2a2a;--text:#f0f0f0;--muted:#888;--green:#25d366;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;}

.hidden{display:none!important;}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:40px;width:100%;max-width:380px;text-align:center;}
.login-logo{font-family:'Bebas Neue';font-size:36px;background:linear-gradient(135deg,var(--red-hot),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-input{width:100%;padding:12px;margin:10px 0;border-radius:6px;border:1px solid var(--border);background:var(--dark);color:var(--text);}
.login-btn{width:100%;padding:14px;background:var(--red);border:none;color:#fff;font-weight:700;cursor:pointer;border-radius:6px;}
.login-error{color:#ff4444;font-size:13px;display:none;}

/* ADMIN */
.admin-screen{display:none;min-height:100vh;}
.admin-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--dark);border-bottom:1px solid var(--border);}
.admin-logo{font-family:'Bebas Neue';background:linear-gradient(135deg,var(--red-hot),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;}

.tabs{display:flex;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);}
.tab{background:none;border:none;color:var(--muted);padding:10px;cursor:pointer;}
.tab.active{color:var(--red);}
.tab-content{display:none;padding:20px;}
.tab-content.active{display:block;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">ADEGA MOTTA</div>

    <input class="login-input" id="lu" placeholder="Usuário">
    <input class="login-input" id="lp" type="password" placeholder="Senha">

    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="le">Login inválido</div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="admin-screen">

  <div class="admin-header">
    <div class="admin-logo">⚙️ Admin — Adega do Motta</div>
    <button class="logout-btn" onclick="doLogout()">Sair</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="openTab('produtos')">Produtos</button>
    <button class="tab" onclick="openTab('pedidos')">Pedidos</button>
    <button class="tab" onclick="openTab('usuarios')">Usuários</button>
  </div>

  <div id="produtos" class="tab-content active">
    <h2>Produtos</h2>
    <button onclick="alert('Novo produto')">+ Novo Produto</button>
  </div>

  <div id="pedidos" class="tab-content">
    <h2>Pedidos</h2>
  </div>

  <div id="usuarios" class="tab-content">
    <h2>Usuários</h2>
    <div id="userList"></div>
  </div>

</div>

<script>

/* =========================
   USUÁRIOS MESCLADOS (2 SISTEMAS)
========================= */
const USERS = [
  {user:'dono', passHash:'64f7eba2d0e2f5e0ce4199030482aad33df9aa18f830832f777bdf0c0a467736', role:'dono', name:'Jean Claude'},
  {user:'func', passHash:'75b96e662678d418ef9a4d9d009f352d1ea7ea82011b9277eb96e4793300138d8', role:'funcionario', name:'Funcionário'},

  {user:'motta', passHash:'fbf0f3bc8a9ac327ba375e9addcdbc13376653fb409b7d8ab5eed45dc460855e', role:'dono', name:'Motta Admin'},
  {user:'func_old', passHash:'44f367ff96e1a885c57191f6000397f8e7717532afea50a127604650ce5b2ced', role:'funcionario', name:'Funcionário 2'}
];

let currentUser=null;

/* =========================
   LOGIN SHA256
========================= */
async function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();

  const enc=new TextEncoder();
  const hash=await crypto.subtle.digest("SHA-256",enc.encode(p));

  const hex=Array.from(new Uint8Array(hash))
    .map(b=>b.toString(16).padStart(2,'0')).join('');

  const found=USERS.find(x=>x.user===u && x.passHash===hex);

  if(!found){
    document.getElementById('le').style.display='block';
    return;
  }

  currentUser=found;

  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-screen').style.display='block';
}

/* =========================
   LOGOUT
========================= */
function doLogout(){
  location.reload();
}

/* =========================
   TABS
========================= */
function openTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));

  event.target.classList.add('active');
  document.getElementById(id).classList.add('active');
}

/* =========================
   USERS UI
========================= */
function renderUsers(){
  document.getElementById('userList').innerHTML =
  USERS.map(u=>`
    <div style="padding:10px;border:1px solid #333;margin:5px">
      <b>${u.name}</b> - ${u.role}
    </div>
  `).join('');
}

</script>

</body>
</html>
