<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega do Motta</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #cc0000;
            --red-hot: #ff2200;
            --yellow: #ffcc00;
            --black: #0a0a0a;
            --dark: #111111;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --muted: #888;
            --green: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black ); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

        .closed-banner { background: #1a0000; border-bottom: 2px solid var(--red); padding: 12px 24px; text-align: center; display: none; }
        .closed-banner.show { display: block; }
        .closed-banner-text { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 1px; color: #ff6666; }

        header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .logo { display: flex; align-items: center; }
        nav { display: flex; gap: 20px; align-items: center; }
        nav > a { color: var(--muted); text-decoration: none; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s; display: flex; align-items: center; gap: 6px; }
        nav > a:hover { color: var(--yellow); }
        
        .insta-btn { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); color: white !important; padding: 6px 14px; border-radius: 4px; }
        .cart-btn { background: var(--red); color: white; border: none; padding: 8px 16px; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .cart-btn:hover { background: var(--red-hot); }
        .cart-count { background: var(--yellow); color: var(--black); font-size: 11px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .hero { position: relative; padding: 80px 24px 60px; text-align: center; overflow: hidden; }
        .hero-tag { display: inline-block; background: var(--red); color: white; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; padding: 4px 14px; border-radius: 2px; margin-bottom: 20px; }
        .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(56px, 10vw, 100px); line-height: 0.95; letter-spacing: 3px; margin-bottom: 8px; }
        .hero h1 span { background: linear-gradient(135deg, var(--red-hot), var(--yellow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hero p { color: var(--muted); font-size: 16px; margin-bottom: 32px; max-width: 400px; margin-left: auto; margin-right: auto; }

        .btn-primary { background: var(--red); color: white; padding: 14px 32px; border: none; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
        .btn-outline { background: transparent; color: var(--yellow); padding: 14px 32px; border: 2px solid var(--yellow); border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }

        .badges { display: flex; justify-content: center; gap: 32px; padding: 24px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .badge { display: flex; align-items: center; gap: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
        .badge-icon { color: var(--yellow); font-size: 18px; }

        section { padding: 60px 24px; max-width: 1200px; margin: 0 auto; }
        .section-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 32px; }
        .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; }
        .section-line { flex: 1; height: 1px; background: var(--border); }

        .categories { display: flex; gap: 10px; margin-bottom: 32px; flex-wrap: wrap; }
        .cat-btn { background: var(--card); color: var(--muted); border: 1px solid var(--border); padding: 8px 18px; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
        .cat-btn.active { background: var(--red); color: white; border-color: var(--red); }

        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
        .product-card:hover { border-color: var(--red); transform: translateY(-3px); }
        .product-img { width: 100%; height: 180px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 56px; overflow: hidden; position: relative; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 14px; }
        .product-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .product-price { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--yellow); }
        .add-btn { background: var(--red); color: white; border: none; width: 34px; height: 34px; border-radius: 4px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; backdrop-filter: blur(4px); }
        .cart-overlay.open { display: block; }
        .cart-sidebar { position: fixed; right: 0; top: 0; height: 100%; width: 420px; max-width: 100vw; background: var(--dark); border-left: 1px solid var(--border); z-index: 201; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; }
        .cart-sidebar.open { transform: translateX(0); }
        
        .cart-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .cart-body { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-footer { padding: 20px; border-top: 1px solid var(--border); background: var(--dark); }
        
        .step-content { display: none; }
        .step-content.active { display: block; }
        
        .form-field { margin-bottom: 15px; }
        .form-label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
        .form-input { width: 100%; background: var(--card); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 4px; }
        
        .pay-opts { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .pay-opt { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 10px; border-radius: 4px; cursor: pointer; text-align: center; }
        .pay-opt.active { background: var(--red); color: white; border-color: var(--red); }

        .pix-box { background: rgba(37,211,102,0.1); border: 1px solid var(--green); padding: 15px; border-radius: 6px; display: none; margin-bottom: 15px; }
        .pix-box.show { display: block; }
        .comp-upload { border: 2px dashed var(--border); padding: 15px; text-align: center; cursor: pointer; margin-top: 10px; position: relative; }
        .comp-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .btn-next { width: 100%; background: var(--red); color: white; border: none; padding: 14px; border-radius: 4px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .btn-back { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 14px; border-radius: 4px; cursor: pointer; margin-right: 10px; display: none; }
        
        .mobile-menu { display: none; position: fixed; top: 64px; left: 0; right: 0; background: var(--black); padding: 20px; z-index: 99; flex-direction: column; gap: 15px; border-bottom: 1px solid var(--border); }
        .mobile-menu.open { display: flex; }
        .mobile-menu a { color: white; text-decoration: none; font-size: 18px; text-transform: uppercase; font-weight: 600; display: flex; align-items: center; gap: 10px; }

        @media(max-width: 640px) {
            .cart-sidebar { width: 100vw; }
            .products { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
